<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - ERDAULET SHOW</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        button { width: 90%; height: 150px; background: #ff0055; color: white; font-size: 30px; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 0, 85, 0.4); }
        #status { margin-top: 20px; color: gold; font-weight: bold; }
    </style>
</head>
<body>
    <h1>ERDAULET SHOW</h1>
    <div id="status">ПОДКЛЮЧЕНИЕ...</div>
    <button onclick="sendSpin()">🎰 КРУТИТЬ БАРАБАН 🎰</button>

    <script>
        const TARGET_ID = 'erdaulet_luck_2026'; 
        const peer = new Peer(); // ID бос болсын
        let conn = null;

        function connect() {
            conn = peer.connect(TARGET_ID);
            conn.on('open', () => {
                document.getElementById('status').innerText = "ЭКРАН ПОДКЛЮЧЕН! ✅";
                document.getElementById('status').style.color = "#00ffcc";
            });
            conn.on('close', () => {
                document.getElementById('status').innerText = "ПОИСК ЭКРАНА...";
                setTimeout(connect, 3000);
            });
        }

        function sendSpin() {
            if (conn && conn.open) {
                // МАҢЫЗДЫ: Типі 'SPIN' болуы керек
                conn.send({ type: 'SPIN' });
                document.getElementById('status').innerText = "КОМАНДА ОТПРАВЛЕНА!";
            } else {
                alert("Экран не найден! Попробуйте еще раз через 2 сек.");
                connect();
            }
        }

        peer.on('open', connect);
    </script>
</body>
</html>
