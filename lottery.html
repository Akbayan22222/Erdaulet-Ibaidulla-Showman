<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РЕГИСТРАЦИЯ - ERDAULET SHOW</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #ff0055; border-radius: 20px; padding: 20px; background: #111; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 18px; }
        #photo-preview { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid #ff0055; }
        button { background: #ff0055; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box" id="reg-form">
        <h2 style="color:#ff0055">ERDAULET IBADULLA SHOW</h2>
        <p>Сделайте фото для участия в розыгрыше</p>
        <input type="text" id="userName" placeholder="Ваше Имя">
        <input type="file" id="userPhoto" accept="image/*" capture="user" style="display:none">
        <button onclick="document.getElementById('userPhoto').click()">📸 СДЕЛАТЬ ФОТО</button>
        <img id="photo-preview">
        <br><br>
        <button id="sendBtn" style="background: #007bff; color: white; display:none" onclick="sendData()">УЧАСТВОВАТЬ</button>
    </div>
    <div id="status" style="display:none; color:#00ffcc; font-weight:bold; margin-top:20px;">ВЫ В СПИСКЕ! ЖДИТЕ РОЗЫГРЫША 🎁</div>

    <script>
        const TARGET_ID = 'erdaulet_luck_2026'; // Лотерея экранының ID-і
        const peer = new Peer(); 

        let photoBase64 = "";

        document.getElementById('userPhoto').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                photoBase64 = reader.result;
                const img = document.getElementById('photo-preview');
                img.src = photoBase64; img.style.display = "block";
                document.getElementById('sendBtn').style.display = "block";
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function sendData() {
            const name = document.getElementById('userName').value;
            if(!name) return alert("Введите имя!");
            
            const conn = peer.connect(TARGET_ID);
            conn.on('open', () => {
                conn.send({ type: 'REGISTER', name: name, photo: photoBase64 });
                document.getElementById('reg-form').style.display = "none";
                document.getElementById('status').style.display = "block";
            });
        }
    </script>
</body>
</html>
