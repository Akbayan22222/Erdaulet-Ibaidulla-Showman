<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Show Client</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Басты стильдер бұрынғыша қалады */
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; transition: background 0.1s; overflow: hidden; text-align: center; }
        
        /* === СУРЕТТІ ДӨҢГЕЛЕККЕ ӘДЕМІЛЕП ТУРАЛАУ КОДЫ (ОСЫНЫ АУЫСТЫР) === */
        .photo-container { 
            width: 180px;  /* Керекті өлшем */
            height: 180px; 
            border-radius: 50%; /* Сыртын дөңгелек қылады */
            border: 4px solid #ff0055; 
            overflow: hidden; /* Сыртына шыққан бұрыштарды кесіп тастайды */
            margin-bottom: 20px; 
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.6); 
            display: inline-block; 
            position: relative;
        }
        
        .photo-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* СУРЕТТІ СОЗБАЙ, ДӨҢГЕЛЕККЕ ТОЛЫҚ СЫЙДЫРАДЫ (ЕҢ МАҢЫЗДЫСЫ) */
            object-position: center; /* Суреттің ортасын көрсетеді (мысалы бетін) */
            position: absolute;
            top: 0;
            left: 0;
        }
        /* ================================================================= */

        /* Қалған стильдер бұрынғыша қалады */
        .container { padding: 20px; }
        h1 { font-size: 24px; margin: 10px 0; letter-spacing: 2px; }
        p { font-size: 15px; opacity: 0.8; margin-bottom: 25px; line-height: 1.4; }
        #startBtn { padding: 18px 35px; font-size: 18px; border-radius: 50px; border: none; background: #ff0055; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase; box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); }
        #status { margin-top: 20px; font-size: 14px; color: #00ffcc; display: none; font-weight: bold; }
        #hiddenVideo { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>
    <video id="hiddenVideo" autoplay playsinline muted></video>

    <div class="container" id="mainUI">
        <div class="photo-container"><img src="erdaulet3.png" alt="Erdaulet"></div>
        <h1>ERDAULET SHOW</h1>
        <p>Нажмите кнопку, чтобы стать частью<br>светового перформанса</p>
        <button id="startBtn">ВОЙТИ В ШОУ</button>
        <div id="status">Подключение...</div>
    </div>

    <script>
        /* JavaScript логикасы бұрынғыша қалады */
        const ADMIN_ID = 'erdaulet_show_master_2026'; 
        const peer = new Peer();
        let videoTrack = null;
        const videoElement = document.getElementById('hiddenVideo');

        document.getElementById('startBtn').onclick = async () => {
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('status');
            btn.style.display = 'none';
            status.style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: true 
                });
                videoElement.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                const audioTrack = stream.getAudioTracks()[0];
                if (audioTrack) audioTrack.stop(); 
                status.innerText = "Доступ получен. Соединение...";
            } catch (e) {
                status.innerText = "Режим: Экранная вспышка";
            }

            const conn = peer.connect(ADMIN_ID);
            conn.on('open', () => {
                status.innerText = "ВЫ В ИГРЕ! Не закрывайте экран.";
            });

            conn.on('data', async (data) => {
                if (data === 'FLASH') {
                    if (videoTrack) {
                        try {
                            await videoTrack.applyConstraints({ advanced: [{ torch: true }] });
                            setTimeout(() => { videoTrack.applyConstraints({ advanced: [{ torch: false }] }); }, 200);
                        } catch (err) {}
                    }
                    document.body.style.backgroundColor = 'white';
                    setTimeout(() => { document.body.style.backgroundColor = 'black'; }, 200);
                }
            });
        };
    </script>
</body>
</html>
