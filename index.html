<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Show Client</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; transition: background 0.1s; overflow: hidden; text-align: center; }
        
        /* КЕЗ КЕЛГЕН ФОТОҒА АРНАЛҒАН УНИВЕРСАЛДЫ КОНТЕЙНЕР */
        .photo-container { 
            width: 80%; /* Экран енінің 80 пайызы */
            max-width: 300px; /* Өте үлкен болып кетпеуі үшін шектеу */
            margin-bottom: 25px;
            border-radius: 15px; /* Бұрыштарын жұмсарту */
            overflow: hidden; /* Сыртына шыққан бөліктерді кесу */
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.4);
            background: #111; /* Фото жүктелгенше тұратын фон */
            
            /* Суреттің пропорциясын сақтау (мысалы 1:1 квадрат немесе суреттің өз өлшемі) */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-container img { 
            width: 100%; 
            height: auto; 
            max-height: 40vh; /* Экранның жартысынан аспауы керек */
            object-fit: contain; /* СУРЕТТІ ТОЛЫҚ КӨРСЕТУ (қиып тастамайды, созбайды) */
            display: block;
        }

        .container { padding: 20px; width: 100%; box-sizing: border-box; }
        h1 { font-size: 24px; margin: 10px 0; letter-spacing: 2px; text-transform: uppercase; }
        p { font-size: 15px; opacity: 0.8; margin-bottom: 25px; line-height: 1.4; padding: 0 10px; }
        
        #startBtn { 
            padding: 18px 35px; font-size: 18px; border-radius: 50px; border: none; 
            background: #ff0055; color: white; cursor: pointer; font-weight: bold; 
            text-transform: uppercase; box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); 
            transition: 0.3s;
        }
        #startBtn:active { transform: scale(0.95); }
        
        #status { margin-top: 25px; font-size: 14px; color: #00ffcc; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container" id="mainUI">
        <div class="photo-container">
            <img src="erdaulet2.png" alt="Ведущий">
        </div>
        
        <h1>MEDET EVENT SHOW</h1>
        <p>Нажмите кнопку, чтобы стать частью<br>светового перформанса</p>
        
        <button id="startBtn">ВОЙТИ В ШОУ</button>
        <div id="status">Подключение...</div>
    </div>

    <script>
        const ADMIN_ID = 'medet_show_master_2026'; 
        const peer = new Peer();
        let videoTrack = null;

        document.getElementById('startBtn').onclick = async () => {
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('status');
            btn.style.display = 'none';
            status.style.display = 'block';

            try {
                // Бір уақытта камера мен аудио сұрау (Сафари үшін)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: true 
                });
                
                videoTrack = stream.getVideoTracks()[0];
                const audioTrack = stream.getAudioTracks()[0];
                if (audioTrack) audioTrack.stop(); 

                status.innerText = "Доступ получен. Соединение...";
            } catch (e) {
                status.innerText = "Режим: Экранная вспышка";
            }

            const conn = peer.connect(ADMIN_ID);
            conn.on('open', () => {
                status.innerText = "ВЫ В ИГРЕ! Не закрывайте экран.";
            });

            conn.on('data', async (data) => {
                if (data === 'FLASH') {
                    if (videoTrack) {
                        try {
                            await videoTrack.applyConstraints({ advanced: [{ torch: true }] });
                            setTimeout(() => { videoTrack.applyConstraints({ advanced: [{ torch: false }] }); }, 200);
                        } catch (err) {}
                    }
                    document.body.style.backgroundColor = 'white';
                    setTimeout(() => { document.body.style.backgroundColor = 'black'; }, 200);
                }
            });
        };
    </script>
</body>
</html>
