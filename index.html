<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Show Client</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; transition: background 0.1s; overflow: hidden; text-align: center; }
        
        /* --- КРУЖОКТЫ АЛЫП ТАСТАУ ЖӘНЕ СУРЕТТІ ТҮЗЕТУ --- */
        .photo-container { 
            width: 100%; /* Экранның еніне қарай */
            max-width: 300px; /* Сурет тым үлкен болмауы үшін */
            height: auto; 
            margin-bottom: 20px; 
            /* Дөңгелекті (border-radius: 50%) алып тастадық */
            border-radius: 20px; /* Бұрыштарын сәл ғана жұмсарттық (стиль үшін) */
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3); /* Жеңіл жылтыр */
        }
        
        .photo-container img { 
            width: 100%; 
            height: auto; 
            display: block;
            object-fit: contain; /* Суретті толық көрсетеді */
        }
        /* ----------------------------------------------- */

        .container { padding: 20px; z-index: 10; }
        h1 { font-size: 26px; margin: 15px 0 5px 0; letter-spacing: 2px; font-weight: 800; }
        p { font-size: 16px; opacity: 0.7; margin-bottom: 30px; line-height: 1.4; }
        
        #startBtn { 
            padding: 20px 45px; font-size: 18px; border-radius: 50px; border: none; 
            background: #ff0055; color: white; cursor: pointer; font-weight: bold; 
            text-transform: uppercase; box-shadow: 0 5px 20px rgba(255, 0, 85, 0.5); 
            transition: 0.3s;
        }
        #startBtn:active { transform: scale(0.9); }
        
        #status { margin-top: 20px; font-size: 15px; color: #00ffcc; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="mainUI">
        <div class="photo-container">
            <img src="erdaulet2.png" alt="Erdaulet Show">
        </div>
        
        <h1>ERDAULET SHOW</h1>
        <p>Нажмите кнопку, чтобы стать частью<br>светового перформанса</p>
        
        <button id="startBtn">ВОЙТИ В ШОУ</button>
        <div id="status">Подключение...</div>
    </div>

    <script>
        // Бұрынғы логика (PeerJS және FLASH) сол қалпында қалады
        const ADMIN_ID = 'erdaulet_show_master_2026'; 
        const peer = new Peer();
        let videoTrack = null;

        document.getElementById('startBtn').onclick = async () => {
            const btn = document.getElementById('startBtn');
            const status = document.getElementById('status');
            btn.style.display = 'none';
            status.style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: true 
                });
                videoTrack = stream.getVideoTracks()[0];
                const audioTrack = stream.getAudioTracks()[0];
                if (audioTrack) audioTrack.stop(); 
                status.innerText = "Соединение установлено...";
            } catch (e) {
                status.innerText = "Экранный режим активен";
            }

            const conn = peer.connect(ADMIN_ID);
            conn.on('open', () => {
                status.innerText = "ВЫ В ИГРЕ! Не закрывайте экран.";
            });

            conn.on('data', async (data) => {
                if (data === 'FLASH') {
                    if (videoTrack) {
                        try {
                            await videoTrack.applyConstraints({ advanced: [{ torch: true }] });
                            setTimeout(() => { videoTrack.applyConstraints({ advanced: [{ torch: false }] }); }, 200);
                        } catch (err) {}
                    }
                    document.body.style.backgroundColor = 'white';
                    setTimeout(() => { document.body.style.backgroundColor = 'black'; }, 200);
                }
            });
        };
    </script>
</body>
</html>
