<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LOTTERY SCREEN</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #winner-photo { width: 350px; height: 350px; border-radius: 50%; border: 15px solid gold; box-shadow: 0 0 50px gold; object-fit: cover; display: none; }
        #winner-name { font-size: 80px; color: gold; margin-top: 20px; text-shadow: 0 0 30px gold; }
    </style>
</head>
<body>
    <div id="branding" style="position:absolute; top:20px; left:20px;">
        <h1 style="color:#ff0055; margin:0;">ERDAULET SHOW</h1>
    </div>
    
    <div id="winner-card">
        <img id="winner-photo" src="">
        <div id="winner-name">ОЖИДАНИЕ...</div>
    </div>

    <script>
        const MY_ID = 'erdaulet_luck_2026';
        const peer = new Peer(MY_ID); // БҰЛ ЖЕРДЕ ID МІНДЕТТІ ТҮРДЕ КЕРЕК
        let guests = [];

        peer.on('open', () => console.log("Экран готов... ID: " + MY_ID));

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                // Қонақ тіркелгенде
                if (data.name && data.photo) {
                    guests.push(data);
                    console.log("Новый гость: " + data.name);
                }
                // Админ "Старт" бергенде
                if (data.start) startSpin();
            });
        });

        function startSpin() {
            if (guests.length === 0) return alert("Гостей нет!");
            const photo = document.getElementById('winner-photo');
            const nameDiv = document.getElementById('winner-name');
            photo.style.display = "block";
            
            let timer = 0;
            let interval = setInterval(() => {
                let g = guests[Math.floor(Math.random() * guests.length)];
                photo.src = g.photo;
                nameDiv.innerText = g.name;
                timer += 100;
                if (timer > 4000) { clearInterval(interval); nameDiv.style.color = "#00ffcc"; }
            }, 100);
        }
    </script>
</body>
</html>
